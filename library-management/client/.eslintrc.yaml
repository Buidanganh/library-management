root: true
env:
  browser: true
  es2021: true
parser: '@typescript-eslint/parser'
parserOptions:
  ecmaVersion: 2021
  sourceType: module
  ecmaFeatures:
    jsx: true
  project:
    - './tsconfig.json'
  warnOnUnsupportedTypeScriptVersion: false
plugins:
  - react
  - react-hooks
  - react-refresh
  - '@typescript-eslint'
extends:
  - eslint:recommended
  - plugin:react/recommended
  - plugin:@typescript-eslint/recommended
  - plugin:react-hooks/recommended
  - plugin:react-refresh/recommended
  - prettier
settings:
  react:
    version: detect
rules:
  react/react-in-jsx-scope: off
  '@typescript-eslint/no-unused-vars':
    - warn
    - argsIgnorePattern: '^_'
